name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; let in-progress runs finish rather than
# canceling them mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rapidrest.io
        uses: actions/checkout@v4
        with:
          path: rapidrest.io

      # The API Reference section (docusaurus-plugin-typedoc, see
      # docusaurus.config.ts) generates docs directly from these packages'
      # TypeScript source, so it needs them checked out as siblings of
      # rapidrest.io — matching the layout expected locally. Add another
      # checkout here (and a matching plugin entry in docusaurus.config.ts)
      # for any future package once its API is ready to include.
      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: rapidrest/core
          path: core

      - name: Checkout service-core
        uses: actions/checkout@v4
        with:
          repository: rapidrest/service-core
          path: service-core

      - name: Checkout auth
        uses: actions/checkout@v4
        with:
          repository: rapidrest/auth
          path: auth

      - name: Checkout react
        uses: actions/checkout@v4
        with:
          repository: rapidrest/react
          path: react

      - name: Enable Corepack (for Yarn Berry)
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: rapidrest.io/yarn.lock

      # TypeDoc needs each package's own node_modules present to resolve its
      # types (ioredis, mongodb, winston, etc.) — install alongside the main
      # site's dependencies, not just checkout the source.
      - name: Install core dependencies
        working-directory: core
        run: yarn install --immutable

      - name: Install service-core dependencies
        working-directory: service-core
        run: yarn install --immutable

      - name: Install auth dependencies
        working-directory: auth
        run: yarn install --immutable

      - name: Install react dependencies
        working-directory: react
        run: yarn install --immutable

      - name: Install dependencies
        working-directory: rapidrest.io
        run: yarn install --immutable

      - name: Build
        working-directory: rapidrest.io
        run: yarn build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rapidrest.io/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
